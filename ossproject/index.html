<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게임 맞추기</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <main>
        <!-- 시작 / 문제 갯수 선택 화면 -->
        <section id="setup">    
            <h1>문제 갯수를 선택하세요.</h1>
            <h2>띄어쓰기 X, 맞춤법 상관 X</h2>
            <button onclick="startGame(5)">5문제</button>
            <button onclick="startGame(10)">10문제</button>
            <button onclick="startGame(15)">15문제</button>
        </section>

        <!-- 게임 화면 -->
        <section id="game-display" style="display:none;">
            <div id="room-info">
                <span id="round-info">라운드: 1/5</span>
            </div>

            <div id="timer">남은 시간: 7초</div>
            
            <div id="question-area">
                <p>[ 여기에 이미지가 표시됩니다 ]</p>
            </div>

            <div id="answer-section">
                <input type="text" id="user-answer" placeholder="정답을 입력하세요!">
                <button id="send-btn" type="button">전송</button>
            </div>

            <!-- 정답/오답 피드백 영역 -->
            <div id="feedback"></div>
        </section>

        <!-- 결과 화면 -->
        <section id="result-display" style="display:none;">
            <h2>게임 결과</h2>
            <p id="final-score">최종 점수: 0점</p>
        </section>

    </main>
    
    <script src="index.js"></script>
</body>
</html>
